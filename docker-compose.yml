version: '3.8'

services:
  web-uas:
    image: nginx:latest
    container_name: uas_web_deployment
    ports:
      - "8086:80"
    volumes:
      - ./html:/usr/share/nginx/html
    restart: always

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: monitoring_uas_azza
    ports:
      - "3007:3007" 
    volumes:
      - uptime-kuma-data:/app/data
    restart: always

volumes:
  uptime-kuma-data:
